server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https://cards.scryfall.io https://c1.scryfall.com data: blob:; connect-src 'self' wss://vplaymat.com ws://localhost:5173 https://api.scryfall.com https://vplaymat.goatcounter.com; script-src 'self' https://gc.zgo.at; style-src 'self' 'unsafe-inline'; font-src 'self';" always;

    # Serve the built Vite frontend
    root /var/www/html;
    index index.html;

    # WebSocket proxy — must come before the generic location block
    location = /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Backend API proxy
    location ~ ^/(game|deck|cards|health)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — unknown paths serve index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }
}
