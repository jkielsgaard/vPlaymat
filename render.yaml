# Render.com Blueprint — deploys vPlaymat as a single Docker container.
#
# One-click deploy:
#   1. Fork this repo on GitHub
#   2. Go to https://dashboard.render.com/blueprints and connect your fork
#   3. Render builds and runs the single container (nginx + uvicorn)
#   4. After the service is live, copy its URL (e.g. https://vplaymat.onrender.com)
#   5. Set ALLOWED_ORIGINS and PUBLIC_URL in the Render dashboard env vars to that URL
#      and trigger a redeploy
#
# Free tier note: services spin down after 15 minutes of inactivity.
# The reconnect banner will appear while the backend wakes (~30s); your
# cached game state restores automatically once reconnected.

services:
  - type: web
    name: vplaymat
    runtime: docker
    dockerfilePath: Dockerfile.prod
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      # Update these to your Render service URL after the first deploy
      - key: ALLOWED_ORIGINS
        value: https://vplaymat.onrender.com
      - key: PUBLIC_URL
        value: https://vplaymat.onrender.com
